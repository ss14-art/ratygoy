- type: entity
  id: BaseCoin
  parent: BaseItem
  abstract: true
  name: coin
  description: A flat bit of metal. If it was still in circulation, inflation would've made it worthless. Since it isn't, it's worth enough to keep in a book.
  components:
  - type: Appearance
  - type: Sprite
    state: coin_1
    layers:
    - state: coin_1
      map: ["base"]
  - type: Item
    size: Tiny
  - type: StackPrice
    price: 0
  - type: Stack
    count: 1
    baseLayer: base
    layerStates:
    - coin_1
    - coin_2
    - coin_3
    - coin_4
  - type: NFCoin # So it can go in wallets

- type: entity
  id: CoinIron
  parent: BaseCoin
  name: iron coin
  components:
