- type: entity
  id: OrganAnimalMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Animal ]

- type: entity
  parent: OrganBase
  id: OrganAnimal
  abstract: true
  suffix: Animal

- type: entity
  parent: OrganAnimal
  id: OrganAnimalInternal
  abstract: true
  # this allows the organs to be turned into biomass in the biogenerator
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 2
        reagents:
        - ReagentId: Nutriment
          Quantity: 2
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi

- type: entity
  parent: [ OrganBaseLungs, OrganAnimalInternal, OrganAnimalMetabolizer ]
  id: OrganAnimalLungs
  # this allows the organs to be turned into biomass in the biogenerator
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 2
        reagents:
        - ReagentId: Nutriment
          Quantity: 2

- type: entity
  parent: [ OrganBaseHeart, OrganAnimalInternal, OrganAnimalMetabolizer ]
  id: OrganAnimalHeart

- type: entity
  parent: [ OrganBaseStomach, OrganAnimalInternal, OrganAnimalMetabolizer ]
  id: OrganAnimalStomach
  # this allows the organs to be turned into biomass in the biogenerator
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 2
        reagents:
        - ReagentId: Nutriment
          Quantity: 2
      stomach:
        maxVol: 50

- type: entity
  parent: [ OrganBaseLiver, OrganAnimalInternal, OrganAnimalMetabolizer ]
  id: OrganAnimalLiver

- type: entity
  parent: [ OrganBaseKidneys, OrganAnimalInternal, OrganAnimalMetabolizer ]
  id: OrganAnimalKidneys

- type: entity
  id: BaseMobAnimal
  abstract: true
  components:
  - type: Body
  - type: EntityTableContainerFill
    containers:
      body_organs: !type:AllSelector
        children:
        - id: OrganAnimalLungs
        - id: OrganAnimalHeart
        - id: OrganAnimalStomach
        - id: OrganAnimalLiver
        - id: OrganAnimalKidneys
